[package]
name = "tasks"
version = "0.2.0"
edition = "2024"

[dependencies]
i18n-embed-fl = "*"
rust-embed = "*"
open = "*"
dirs = "*"
cli-clipboard = "*"
slotmap = "*"
ron = "*"
thiserror = "*"
tracing = "*"
quick-xml = "*"
icalendar = "*"
base64 = "*"
url = "*"

[dependencies.reqwest]
version = "*"
default-features = false
features = ["rustls-tls", "gzip"]

[dependencies.tracing-subscriber]
version = "*"
features = ["env-filter"]

[dependencies.libcosmic]
git = "https://github.com/pop-os/libcosmic.git"
default-features = false
features = ["multi-window", "tokio", "winit", "about", "wayland", "wgpu"]

[dependencies.i18n-embed]
version = "0.16.0"
features = ["fluent-system", "desktop-requester"]

[dependencies.serde]
version = "*"
features = ["derive"]

[dependencies.sqlx]
version = "*"
features = ["sqlite"]
default-features = false

[dependencies.chrono]
version = "*"
features = ["serde"]

[dependencies.uuid]
version = "1.18.1"
features = ["v4"]

[patch."https://github.com/smithay/client-toolkit.git"]
sctk = { package = "smithay-client-toolkit", version = "*" }

