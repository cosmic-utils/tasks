name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flatpak:
    name: "Flatpak"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-cargo-generator deps
        run: pip3 install aiohttp toml

      - name: Generate cargo-sources.json
        run: |
          curl -Lo flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json

      - name: Upload cargo-sources.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: cargo-sources-${{ github.ref_name }}
          path: cargo-sources.json
          retention-days: 30

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: tasks.flatpak
          manifest-path: dev.edfloreshz.Tasks.json
          cache-key: flatpak-builder-${{ hashFiles('Cargo.lock') }}
